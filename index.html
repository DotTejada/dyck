<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyck Path Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="dyckfavicon.ico"?v=1>
</head>
<body style="background-color: #121212; color: white;">
    <div class="container">
        <div class="sidebar" id="sidebar">
            <p id="maxpaths"></p>
            <p id="maxpages"></p>
            <p id="curpage"></p>
            <input type="text" id="searchInput" placeholder="0,1,2,3">
            <button id="searchBtn">Search</button>
            <p id="searchInfo"></p>
            <input type="text" id="pageInput" placeholder="Type page #">
            <button id="pageBtn">Go to Page</button>
            <p id="pageInfo"></p>
            <input type="text" id="nInput" placeholder="Type new n">
            <button id="nBtn">Change n</button>
            <p id="nInfo"></p>
        </div>
        <div class="main" id="main">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <script src="index.js"></script>
    <script src="page.js"></script>
</body>
</html>
